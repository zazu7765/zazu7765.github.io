<!DOCTYPE html>
<html lang="en" dir="ltr">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href='https://fonts.googleapis.com/css?family=Nunito Sans' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
  <head>
    <style>
      h1,h2,h3,li,ul {font-family: Montserrat; color: white; font-size: 2vw;}
      p {font-family: Montserrat; color: white; font-size: 2vw;}
      body {background-color: black;}
      a {font-family: Nunito Sans;}
      .awayfromnav {padding-top: 1em;}
    </style>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage</title>
  </head>
  <body>
    <div class="w3-top">
      <div class="w3-bar w3-black w3-card w3-left-align w3-large">
        <a class="w3-bar-item w3-button w3-hide-medium w3-hide-large w3-right w3-padding-large w3-hover-black w3-large w3-white" href="javascript:void(0);" onclick="myFunction()" title="Toggle Navigation Menu"><i class="fa fa-bars"></i></a>
        <a href="#" class="w3-bar-item w3-button w3-padding-large w3-black">HOME</a>
        <a href="twice.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-deep-orange">TWICE</a>
        <a href="itzy.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-pink">ITZY</a>
        <a href="blackpink.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-purple">BLACKPINK</a>
      </div>
    
      <!-- Navbar on small screens -->
      <div id="navDemo" class="w3-bar-block w3-black w3-hide w3-hide-large w3-hide-medium w3-large">
        <a href="twice.html" class="w3-bar-item w3-button w3-padding-large w3-hover-white">TWICE</a>
        <a href="itzy.html" class="w3-bar-item w3-button w3-padding-large w3-hover-white">ITZY</a>
        <a href="blackpink.html" class="w3-bar-item w3-button w3-padding-large w3-hover-white">BLACKPINK</a>
      </div>
    </div>
    <div>
      <h2 class="awayfromnav">Current Pages:</h2>
      <ul>
        <li>TWICE</li>
        <li>ITZY</li>
        <li>BlackPink</li>
        <li>LOOΠΔ (TBA)</li>
        <li>Red Velvet (TBA)</li>
      </ul>
      <h3>
        Use the navbar to reach the pages
      </h3>
    </div>
  </body>
  <script>
    // Used to toggle the menu on small screens when clicking on the menu button
    function myFunction() {
      var x = document.getElementById("navDemo");
      if (x.className.indexOf("w3-show") == -1) {
        x.className += " w3-show";
      } else { 
        x.className = x.className.replace(" w3-show", "");
      }
    }
    </script>
</html>
